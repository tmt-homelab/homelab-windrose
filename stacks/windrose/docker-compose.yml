services:
  windrose:
    image: ghcr.io/overlabbed-com/windrose:latest
    container_name: windrose
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/windrose
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - LITELLM_BASE_URL=https://litellm.themillertribe-int.org/v1
      - SEARXNG_URL=http://windrose-searxng:8080
      - NEXT_PUBLIC_LITELLM_BASE_URL=https://litellm.themillertribe-int.org/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    read_only: true
    tmpfs:
      - /tmp:size=100m
      - /var/run:size=10m
    volumes:
      - windrose-data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: windrose-postgres
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=windrose
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=100m
      - /var/run:size=10m

  redis:
    image: redis:7-alpine
    container_name: windrose-redis
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=100m

  searxng:
    image: searxng/searxng:latest
    container_name: windrose-searxng
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    environment:
      - SEARXNG_BASE_URL=http://windrose-searxng:8080
      - SEARXNG_SECRET=${SEARXNG_SECRET}
    volumes:
      - searxng-config:/etc/searxng
      - searxng-data:/var/lib/searxng
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz')\""]
      interval: 30s
      timeout: 10s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:size=100m

volumes:
  windrose-data:
  postgres-data:
  redis-data:
  searxng-config:
  searxng-data:
